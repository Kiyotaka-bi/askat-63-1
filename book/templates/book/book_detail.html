<!DOCTYPE html>
<html>
<head>
    <title>{{ book.title }}</title>
</head>
<body>

<h1>{{ book.title }}</h1>

<p><b>Автор:</b> {{ book.author }}</p>
<p><b>Описание:</b> {{ book.description }}</p>
<p><b>Дата:</b> {{ book.publication_date }}</p>
<p><b>Цена:</b> {{ book.price }}</p>
<p><b>Страницы:</b> {{ book.pages }}</p>

{% if book.cover %}
    <img src="{{ book.cover.url }}" width="200">
{% endif %}

</body>
</html>
