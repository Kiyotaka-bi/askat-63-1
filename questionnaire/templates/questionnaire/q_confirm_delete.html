<!DOCTYPE html>
<html>
<head>
    <title>Удаление</title>
</head>
<body>
    <h1>Удалить анкету?</h1>
    <p>Вы уверены, что хотите удалить анкету пользователя: <b>{{ anketa.full_name }}</b>?</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" style="color: red;">ДА, УДАЛИТЬ</button>
        <a href="{% url 'q_list' %}">Отмена</a>
    </form>
</body>
</html>
